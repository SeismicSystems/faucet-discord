[supervisord]
environment=NODE_ENV="production"

[program:frontend]
command=npm start
directory=/home/ubuntu/faucet/frontend
user=ubuntu
autostart=true
autorestart=true
startsecs=5
startretries=10
stderr_logfile=/var/log/faucet/frontend.err.log
stdout_logfile=/var/log/faucet/frontend.out.log
environment=NODE_ENV=production,PATH="/usr/local/bin:/usr/bin:/bin"
stopasgroup=true
killasgroup=true
